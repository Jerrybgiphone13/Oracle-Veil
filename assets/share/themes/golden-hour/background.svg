<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#142824"/>
      <stop offset=".52" stop-color="#102b29"/>
      <stop offset="1" stop-color="#0b2222"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="80%" cy="10%" r="50%">
      <stop offset="0" stop-color="#d89035" stop-opacity=".24"/>
      <stop offset=".45" stop-color="#a86224" stop-opacity=".08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".48" numOctaves="3" seed="52" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .11"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="soft-light"/>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#sunGlow)"/>
  <rect width="1080" height="1920" fill="#b7884c" opacity=".11" filter="url(#paper)"/>
</svg>
